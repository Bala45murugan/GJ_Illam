<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House Warming Invitation</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:"Segoe UI",sans-serif;
  background:#000;
}

/* LANGUAGE */
.lang{
  position:fixed;
   top:15px;            
  right:15px;
  color:gold;
  z-index:50;
}
.lang span{
  cursor:pointer;
  margin:0 5px;
}

/* DOOR SCREEN */
#doorScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle,#3a2412,#120a04);
}

/* DOOR */
.door-container{
  position:relative;
  width:260px;
  height:420px;
  perspective:1200px;
}

.ganesha-img{
  position:absolute;
  width:85px;
  top:36%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.95;
  pointer-events:none;
  filter: drop-shadow(0 0 8px rgba(255,215,0,0.6));
}

.mirror{
  transform:translate(-50%,-50%) scaleX(-1);
}

/* DOOR TEXT */
.door-text{
  position:absolute;
  top:55%;
  left:50%;
  transform:translateX(-50%);
  color:gold;
  font-size:13px;
  letter-spacing:1px;
  font-family:serif;
  text-shadow:0 0 5px gold;
}

.door{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:linear-gradient(90deg,#6b3f1d,#4a2a12);
  border:2px solid #2b1608;
  box-shadow:inset 0 0 20px rgba(0,0,0,0.8);
  transition:1.5s ease;
}

.left-door{
  left:0;
  transform-origin:left;
}

.right-door{
  right:0;
  transform-origin:right;
}

/* HANDLE */
.handle{
  position:absolute;
  width:10px;
  height:30px;
  background:gold;
  top:50%;
  transform:translateY(-50%);
}
.left-door .handle{ right:10px; }
.right-door .handle{ left:10px; }

.tap{
  margin-top:20px;
  color:gold;
  font-size:14px;
}

/* INVITE */
#invite{
  display:none;
  height:100vh;
  align-items:center;
  justify-content:center;
  background:
  linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),
  url("https://images.rawpixel.com/image_800/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDIyLTA1L3B4MTE3OTM5My1pbWFnZS1rd3Z5MG94eC5qcGc.jpg")
  center/cover no-repeat fixed;
}

/* CARD */
.card{
  width:92%;
  max-width:650px;
  padding:18px;
  border-radius:20px;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,.4);
  border:1px solid gold;
  text-align:center;
  color:#fff;
  animation:fadeIn 1.2s ease;
}

/* TEXT */
.title{color:#e6d3a3;}
.main-title{font-size:34px;}
.main-title.ta{font-size:26px;}

h3{margin:4px 0;}
h1{margin:6px 0;}
p{margin:6px 0; line-height:1.4;}

.home-img{
  width:120px;
  margin:6px auto;
}

/* NAMEPLATE */
.nameplate-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:8px 0 12px;
}

.rope{
  width:2px;
  height:18px;
  background:#c9a24d;
  margin:0 18px;
}

.nameplate{
  background:linear-gradient(#6b3f1d,#3e2311);
  padding:10px 28px;
  border:2px solid gold;
  border-radius:6px;
  color:gold;
  font-size:18px;
  font-weight:bold;
  letter-spacing:1px;
  box-shadow:0 0 15px rgba(255,215,0,.4);
  font-family:serif;
  animation:sway 3s ease-in-out infinite;
  transform-origin:top center;
}

/* DATE */
.date-box{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  margin:10px 0;
}

.date-left,.date-right{
  color:#e6d3a3;
}

.date-left::before,
.date-left::after,
.date-right::before,
.date-right::after{
  content:"";
  display:block;
  height:1px;
  background:linear-gradient(to right, transparent, gold, transparent);
  margin:5px 0;
}

.date-center{
  border-left:1px solid #e6d3a3;
  border-right:1px solid #e6d3a3;
  padding:0 12px;
}

.day{font-size:26px;color:gold;}

.address{
  margin-top:10px;
  font-size:14px;
}

.elegant-btn{
  display:inline-block;
  margin-top:15px;
  padding:6px 16px;
  border:1px solid gold;
  border-radius:20px;
  color:gold;
  text-decoration:none;
  font-size:13px;
}

/* ANIMATIONS */
@keyframes sway{
  0%{ transform:rotate(-1.5deg); }
  50%{ transform:rotate(1.5deg); }
  100%{ transform:rotate(-1.5deg); }
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1; transform:translateY(0);}
}

/* PETALS */
.petal{
  position:fixed;
  top:-20px;
  width:6px;
  height:6px;
  background:gold;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall{
  to{transform:translateY(110vh);}
}

/* LIGHT EFFECT */
.light{
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(255,215,0,0.4), transparent 70%);
  opacity:0;
  transition:opacity 1s ease;
}

/* MOBILE FIX */
@media (max-width:480px){
  .main-title{font-size:28px;}
  .main-title.ta{font-size:22px;}
  .title{font-size:14px;}
  .door-text{font-size:12px;}
  .tap{font-size:13px;}
  @media (max-width:480px){

  .lang{
    top:6px;        /* even tighter for mobile */
    right:12px;
    font-size:13px;
  }

  #invite{
    align-items:flex-start;   /* 🔥 moves card slightly up */
    padding-top:40px;         /* controls top gap perfectly */
  }

}
}
</style>
</head>

<body>

<div class="lang">
  <span onclick="setLang('en')">EN</span> |
  <span onclick="setLang('ta')">தமிழ்</span>
</div>

<!-- DOOR -->
<div id="doorScreen" onclick="openDoor()">
 <div class="door-container">
  <div class="light"></div>

  <div class="door left-door">
    <img class="ganesha-img" src="https://png.pngtree.com/png-vector/20250121/ourmid/pngtree-ganesha-the-embodiment-of-prosperity-and-joy-png-image_15287837.png">
    <div class="door-text doorText">Welcome</div>
    <div class="handle"></div>
  </div>

  <div class="door right-door">
    <img class="ganesha-img mirror" src="https://png.pngtree.com/png-vector/20250121/ourmid/pngtree-ganesha-the-embodiment-of-prosperity-and-joy-png-image_15287837.png">
    <div class="door-text doorText">Welcome</div>
    <div class="handle"></div>
  </div>

 </div>
 <div class="tap" id="tapText">Tap to Open</div>
</div>

<!-- INVITE -->
<div id="invite">
  <div class="card" id="content"></div>
</div>

<!-- AUDIO -->
<audio id="doorSound" src="./opening-door-411632.mp3" preload="auto"></audio>
<audio id="music" src="./Dude Music.mp3" loop preload="auto"></audio>

<script>
const doorSound=document.getElementById("doorSound");
const music=document.getElementById("music");

let currentLang = "en";

const data = {
  en: `
  <h3 class="title">Welcome to our</h3>
  <h1 class="main-title">New Home</h1>
  <p style="color:#e6d3a3; font-size:14px;">
With joy, we invite you to celebrate this beautiful new beginning with us !!!
</p>

  <img class="home-img"
  src="https://static.vecteezy.com/system/resources/thumbnails/049/514/749/small/beautiful-suburban-family-house-front-view-transparent-png.png">

  <div class="nameplate-wrap">
    <div class="rope"></div>
    <div class="nameplate">GJ Illam</div>
    <div class="rope"></div>
  </div>

  <div class="date-box">
    <div class="date-left">FRIDAY</div>
    <div class="date-center">
      <div>MAY</div>
      <div class="day">29</div>
      <div>2026</div>
    </div>
    <div class="date-right">AT 4:30 AM</div>
  </div>

  <div class="address">Perumalagaram, Koradacheri</div>

  <a class="elegant-btn" target="_blank"
  href="https://maps.app.goo.gl/dVnT5N46sDn5CLET7">Open in Maps</a>

  <p><br><b>Warm Regards,<br>Family</b></p>
  `,

  ta: `
  <h3 class="title">எங்கள்</h3>
  <h1 class="main-title ta">புதிய இல்லத்திற்கு வரவேற்கிறோம்</h1>
  <p style="color:#e6d3a3; font-size:14px;">
மகிழ்ச்சியுடன் இந்த அழகான புதிய தொடக்கத்தை எங்களுடன் கொண்டாட உங்களை அன்புடன் அழைக்கிறோம் !!!
</p>

  <img class="home-img"
  src="https://static.vecteezy.com/system/resources/thumbnails/049/514/749/small/beautiful-suburban-family-house-front-view-transparent-png.png">

  <div class="nameplate-wrap">
    <div class="rope"></div>
    <div class="nameplate">GJ இல்லம்</div>
    <div class="rope"></div>
  </div>

  <div class="date-box">
    <div class="date-left">வெள்ளி</div>
    <div class="date-center">
      <div>மே</div>
      <div class="day">29</div>
      <div>2026</div>
    </div>
    <div class="date-right">காலை 4:30</div>
  </div>

  <div class="address">பெருமாளகரம், கொரடாச்சேரி</div>

  <a class="elegant-btn" target="_blank"
  href="https://maps.app.goo.gl/dVnT5N46sDn5CLET7">வரைபடத்தை திறக்க</a>

  <p><br><b>அன்புடன்,<br>குடும்பத்தினர்</b></p>
  `
};

function updateDoorLanguage(){
  if(currentLang === "ta"){
    document.getElementById("tapText").innerText = "கதவைத் திறக்க";
    document.querySelectorAll(".doorText").forEach(el=> el.innerText="நல்வரவு");
  } else {
    document.getElementById("tapText").innerText = "Tap to Open";
    document.querySelectorAll(".doorText").forEach(el=> el.innerText="Welcome");
  }
}

function openDoor(){
  doorSound.currentTime=0;
  doorSound.play().catch(()=>{});
  document.querySelector(".light").style.opacity = 1;

  document.querySelector(".left-door").style.transform="rotateY(-120deg)";
  document.querySelector(".right-door").style.transform="rotateY(120deg)";

  setTimeout(()=>{
    doorScreen.style.display="none";
    invite.style.display="flex";
    setLang(currentLang);
    petals();

    music.volume=0;
    music.play();
    let v=0;
    let fade=setInterval(()=>{
      if(v<0.4){v+=0.02; music.volume=v;}
      else clearInterval(fade);
    },100);

  },1500);
}

function setLang(lang){
  currentLang = lang;
  document.getElementById("content").innerHTML = data[lang];
  updateDoorLanguage();
}

function petals(){
  for(let i=0;i<20;i++){
    let p=document.createElement("div");
    p.className="petal";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(5+Math.random()*5)+"s";
    document.body.appendChild(p);
  }
}

updateDoorLanguage();
</script>

</body>
</html>
